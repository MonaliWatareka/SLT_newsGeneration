<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Georgia, serif; max-width: 700px; margin: auto; padding: 20px; background: #f9f9f9; }
        .header { background: #1a1a2e; color: white; padding: 30px; text-align: center; border-radius: 8px 8px 0 0; }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        .header .date { font-size: 13px; color: #aaa; margin-top: 8px; }
        .content { background: white; padding: 35px; border-radius: 0 0 8px 8px; border: 1px solid #ddd; line-height: 1.8; color: #333; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:text="${title}">Newsletter Title</h1>
        <div class="date" th:text="'Generated: ' + ${generatedDate}"></div>
    </div>
    <div class="content">
        <p th:utext="${content}"></p>
    </div>
    <div class="footer">
        <p>Auto-generated by SLT News Generator using Ollama AI</p>
    </div>
</body>
</html>
